name: build and deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Eleventy Image
        uses: actions/cache@v4
        with:
          path: |
            .cache
            _site/img
          key: eleventy-cache-${{ hashFiles('photos/**/*') }}
          restore-keys: |
            eleventy-cache-

      - run: npm install

      - run: npx eleventy

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
