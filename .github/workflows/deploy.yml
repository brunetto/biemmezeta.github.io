name: build and deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # cache immagini generate da eleventy-img
      - name: Cache Eleventy Image
        uses: actions/cache@v4
        with:
          path: .cache
          key: eleventy-img-${{ hashFiles('photos/**/*') }}
          restore-keys: |
            eleventy-img-

      - run: npx eleventy

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
